<section class="shop">
    <div class="shop-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Filters</h2>

            <!-- Categories -->
            <div class="filter-group">
                <h3>Categories</h3>
                <ul>
                    <li><label><input type="checkbox"> Men</label></li>
                    <li><label><input type="checkbox"> Women</label></li>
                    <li><label><input type="checkbox"> Kids</label></li>
                </ul>
            </div>

            <!-- Price -->
            <div class="filter-group">
                <h3>Price</h3>
                <ul>
                    <li><label><input type="checkbox"> Under ₹500</label></li>
                    <li><label><input type="checkbox"> ₹500 - ₹1000</label></li>
                    <li><label><input type="checkbox"> ₹1000+</label></li>
                </ul>
            </div>
        </aside>

        <!-- Products Section -->
        <div class="products-section">

            <!-- Top Bar -->
            <div class="top-bar">

                <h2>All Products</h2>

                <div class="search-box">
                    <input type="text" placeholder="Search products...">
                </div>

                <div class="sort-box">
                    <select>
                        <option>Sort by</option>
                        <option>Price Low to High</option>
                        <option>Price High to Low</option>
                        <option>Newest</option>
                    </select>
                </div>

            </div>

            <!-- Product Grid -->
            <div class="product-grid">

                <!-- Product Card -->
                <div class="product-card">
                    <div class="product-img">
                        <img src="/images/products/gaming laptop.png" alt="Laptop">
                        <span class="badge new">New</span>
                    </div>

                    <div class="product-info">
                        <h3 class="product-name">ASUS TUF Gaming A15 (2026)</h3>
                        <div class="product-rating">★★★★★</div>
                        <div class="product-price">
                            <span class="new-price">₹71,999</span>
                        </div>
                        <button class="btn">Add to Cart</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="/images/products/s26.jpg" alt="Phone">
                        <span class="badge">New</span>
                    </div>

                    <div class="product-info">
                        <h3 class="product-name">Samsung Galaxy S26 Ultra</h3>
                        <div class="product-rating">★★★★☆</div>
                        <div class="product-price">
                            <span class="new-price">₹1,59,999</span>
                        </div>
                        <button class="btn">Add to Cart</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="/images/products/jacket1.png" alt="Jacket">
                        <span class="badge">New</span>
                    </div>

                    <div class="product-info">
                        <h3 class="product-name">HRX Bomber Jacket</h3>
                        <div class="product-rating">★★★★☆</div>
                        <div class="product-price">
                            <span class="new-price">₹978</span>
                        </div>
                        <button class="btn">Add to Cart</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="/images/products/samsung tv.png" alt="TV">
                        <span class="badge">New</span>
                    </div>

                    <div class="product-info">
                        <h3 class="product-name">Samsung 8K Smart TV</h3>
                        <div class="product-rating">★★★★☆</div>
                        <div class="product-price">
                            <span class="new-price">₹2,59,990</span>
                        </div>
                        <button class="btn">Add to Cart</button>
                    </div>
                </div>

            </div>

        </div>
    </div>
</section>
