<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-container">

            <!-- Logo -->
            <div class="logo">
                <h2>ShopEase</h2>
            </div>

            <!-- Navigation Menu-->
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>

            <!-- Right Side Icons-->
            <div class="nav-icons">
                <input type="text" placeholder="search.." class="search-box">
                <a href="cart.html">Cart</a>
                <a href="login.html">Login</a>
            </div>
        
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-container">

            <!-- Left Side Text -->
            <div class="hero-text">
                <h4 class="hero-subtitle">New Collection</h4>
                <h1 class="hero-title">Discover Modern Products for Your Lifestyle</h1>
                <p class="hero-description">Explore the latest trends with high-quality products at the best prices.
                    Upgrade your lifestyle with our exclusive collection.
                </p>

                <div class="hero-buttons">
                    <a href="shop.html" class="btn">Shop Now</a>
                    <a href="shop.html" class="btn btn-outline">View Products</a>
                </div>

            </div>

            <!-- Right Side Image -->
            <div class="hero-image">
                <img src="images/banners/hero.jpg" alt="Shopping">
            </div>

        </div>
        
    </section>

    <!-- Products Section -->
    <section>
        <h2>Products</h2>
    </section>

    <!-- Footer -->
    <footer>
        <p>Footer</p>
    </footer>

</body>
</html>
